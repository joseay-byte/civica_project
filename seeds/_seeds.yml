version: 2

seeds:
  - name: country_mapping
    description: "Tabla semilla que actúa como el registro maestro (Golden Record) para homologar los nombres y códigos de los países históricos de la Segunda Guerra Mundial y estaciones meteorológicas."
    columns:
      - name: country_name
        description: "Nombre estandarizado del país o región militar."
        tests:
          - not_null
      - name: nombre_pais_es
        description: "Nombre del pais en español"
        tests:
          - not_null
      - name: iso_2
        description: "Código proxy de 2 caracteres utilizado para los cruces con datos de clima."
        tests:
          - not_null
      - name: iso_3
        description: "Código internacional estándar de 3 caracteres."
      - name: continent
        description: "Continente geográfico al que pertenece la entidad."
      - name: is_axis
        description: "Indicador binario (1/0) si el país perteneció formalmente a las potencias del Eje."
        tests:
          - accepted_values:
              arguments: [0, 1]
      - name: is_allied
        description: "Indicador binario (1/0) si el país perteneció formalmente al bando Aliado."
        tests:
          - accepted_values:
              values: [0, 1]
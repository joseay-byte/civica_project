version: 2

models:
  # =========================================================================
  # 📅 DIMENSIONES Y CATÁLOGOS (Tablas de Apoyo)
  # =========================================================================

  - name: int_calendario
    description: "Dimensión temporal maestra generada dinámicamente que cubre todo el periodo histórico del conflicto."
    columns:
      - name: id_fecha
        description: "Clave primaria sustituta (Hash MD5 de la fecha completa)."
        tests:
          - unique
          - not_null
      - name: fecha_completa
        description: "Fecha en formato DATE real."
        tests:
          - unique
          - not_null

  - name: int_paises
    description: "Dimensión unificada de países basada en el registro maestro de la semilla."
    columns:
      - name: id_pais
        description: "Clave primaria (Hash del nombre del país estandarizado)."
        tests:
          - unique
          - not_null
      - name: bando_principal
        description: "Clasificación analítica del bando para el modelo estrella."
        tests:
          - accepted_values:
              values: ['Allies', 'Axis', 'Neutral/Other']

  - name: int_ubicaciones_estrategicas
    description: "Catálogo dimensional de infraestructuras de guerra, fábricas, astilleros y campos de prisioneros."
    columns:
      - name: id_ubicacion
        description: "Clave primaria (Hash de nombre + coordenadas)."
        tests:
          - unique
          - not_null
      - name: id_pais
        description: "Clave foránea que conecta con la dimensión de países."
        tests:
          - not_null
          - relationships:
              to: ref('int_paises')
              field: id_pais

  - name: int_estaciones_clima
    description: "Catálogo dimensional de las estaciones meteorológicas activas durante el conflicto."
    columns:
      - name: id_estacion
        description: "Clave primaria (Hash del STATION_ID de origen)."
        tests:
          - unique
          - not_null
      - name: id_pais
        description: "Clave foránea que conecta con la dimensión de países."
        tests:
          - relationships:
              to: ref('int_paises')
              field: id_pais

  - name: int_flota_aerea
    description: "Catálogo dimensional de modelos de aeronaves y fuerzas aéreas involucradas en misiones de bombardeo."
    columns:
      - name: id_aeronave
        description: "Clave primaria (Hash de modelo de avión + fuerza aérea)."
        tests:
          - unique
          - not_null

  - name: int_tipos_objetivo
    description: "Catálogo dimensional para clasificar la naturaleza de los objetivos estratégicos atacados."
    columns:
      - name: id_objetivo
        description: "Clave primaria (Hash de tipo de objetivo + industria objetivo)."
        tests:
          - unique
          - not_null

  # =========================================================================
  # 📊 TABLAS DE HECHOS Y TRANSACCIONALES (Métricas)
  # =========================================================================

  - name: int_clima_diario
    description: "Tabla de hechos que registra las condiciones meteorológicas diarias por estación."
    columns:
      - name: id_registro_clima
        description: "Clave primaria de la medición diaria."
        tests:
          - unique
          - not_null
      - name: id_estacion
        description: "Clave foránea hacia la dimensión de estaciones de clima."
        tests:
          - not_null
          - relationships:
              to: ref('int_estaciones_clima')
              field: id_estacion
      - name: id_fecha
        description: "Clave foránea hacia la dimensión de calendario."
        tests:
          - not_null
          - relationships:
              to: ref('int_calendario')
              field: id_fecha

  - name: int_operaciones_aereas
    description: "Tabla de hechos transaccional de operaciones aéreas y misiones de bombardeo."
    columns:
      - name: id_operacion
        description: "Clave primaria de la misión."
        tests:
          - unique
          - not_null
      - name: id_fecha
        description: "Clave foránea de la fecha de la misión."
        tests:
          - not_null
          - relationships:
              to: ref('int_calendario')
              field: id_fecha
      - name: id_pais_origen
        description: "Clave foránea del país que lanza el ataque."
        tests:
          - relationships:
              to: ref('int_paises')
              field: id_pais
      - name: id_pais_objetivo
        description: "Clave foránea del país que recibe el ataque."
        tests:
          - relationships:
              to: ref('int_paises')
              field: id_pais
      - name: id_aeronave
        description: "Clave foránea del tipo de avión utilizado."
        tests:
          - relationships:
              to: ref('int_flota_aerea')
              field: id_aeronave
      - name: id_objetivo
        description: "Clave foránea del tipo de blanco atacado."
        tests:
          - relationships:
              to: ref('int_tipos_objetivo')
              field: id_objetivo

  - name: int_estadisticas_guerra_paises
    description: "Tabla de hechos con las métricas acumuladas de demografía, bajas de guerra y heridos militares por nación."
    columns:
      - name: id_estadistica
        description: "Clave primaria del registro de bajas."
        tests:
          - unique
          - not_null
      - name: id_pais
        description: "Clave foránea que asocia las bajas con el catálogo analítico de países."
        tests:
          - not_null
          - relationships:
              to: ref('int_paises')
              field: id_pais

  - name: int_eventos_historicos
    description: "Tabla de hechos (Factless Fact Table) que registra los hitos cronológicos, tratados y batallas del conflicto."
    columns:
      - name: id_evento
        description: "Clave primaria del evento histórico."
        tests:
          - unique
          - not_null
      - name: id_fecha_inicio
        description: "Clave foránea que conecta la fecha de inicio del evento con el calendario."
        tests:
          - relationships:
              to: ref('int_calendario')
              field: id_fecha

  # =========================================================================
  # 🔗 TABLAS PUENTE (Muchos a Muchos)
  # =========================================================================

  - name: int_evento_participantes
    description: "Tabla puente (Bridge) encargada de normalizar y romper la relación N:M entre eventos históricos y países participantes."
    columns:
      - name: id_evento_participante
        description: "Clave primaria compuesta haseada."
        tests:
          - unique
          - not_null
      - name: id_evento
        description: "Clave foránea que referencia al hito histórico."
        tests:
          - not_null
          - relationships:
              to: ref('int_eventos_historicos')
              field: id_evento
      - name: id_pais
        description: "Clave foránea que vincula al país individualizado como participante activo."
        tests:
          - not_null
          - relationships:
              to: ref('int_paises')
              field: id_pais
      - name: bando
        description: "El rol o alianza del país específico durante dicho evento militar."
        tests:
          - accepted_values:
              values: ['ALLIED', 'AXIS']
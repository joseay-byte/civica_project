version: 2

sources:
  - name: raw_data
    # Usamos Jinja para que la base de datos cambie según el entorno
    database: |
      {{ 'DB35_DEV_BRONZE_DB' if target.name == 'dev' 
         else 'DB35_PRE_BRONZE_DB' if target.name == 'pre' 
         else 'DB35_PRO_BRONZE_DB' }}
    schema: dbt
    tables:
      - name: STG_WEATHER
        description: "Datos meteorológicos diarios históricos de las estaciones durante el periodo de guerra."
      - name: STG_STATIONS_WEATHER
        description: "Catálogo maestro de las estaciones meteorológicas con sus coordenadas y elevación."
      - name: STG_AERIAL_OPERATIONS
        description: "Registro de operaciones aéreas, misiones de bombardeo, aeronaves y toneladas de carga arrojada."
      - name: STG_WW2_D
        description: "Estadísticas agregadas de bajas militares, civiles y población por país en 1939."
      - name: STG_EVENTS
        description: "Cronología de hitos históricos, batallas, tratados y participantes durante el conflicto."
      - name: STG_LOCATIONS
        description: "Ubicaciones estratégicas e infraestructuras militares utilizadas en la guerra."